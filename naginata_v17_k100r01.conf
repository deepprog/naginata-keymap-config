# keymapper 薙刀式v17+百式漢直　英数モードのキー配列変更に対応した版
# (https://github.com/deepprog/naginata-keymap-config)
#
# 薙刀式配列v17ベスト版　　作　大岡俊彦
# 2026年01月11日[【薙刀式】v17ベスト版、発表。](http://oookaworks.seesaa.net/article/519707171.html#gsc.tab=0)
# 2026年03月05日[【薙刀式】百字限定の漢直、百式漢直リリース](https://oookaworks.seesaa.net/article/520053662.html#more&gsc.tab=0)
#
# keymapper version >= 5.4.0
#
#
@options no-update
@allow-unmapped-commands
@enforce-lowercase-commands
@forward-modifiers Shift Control Alt
@virtual-keys-toggle false

# コメント用途　マクロ
# まだ使用してないので無効化
#  _ = # _[コメント]
#  __ = # __[コメント]
#  REM = # REM[コメント]

# 仮想キー 定義　===============================
  COPYINGState = Virtual #コピー中状態

  NaginataOff = Virtual # ホットキーの再現用
  IMEState = Virtual # IMEのON OFF記憶用

# 百式漢直　変換キー{１打目キー} 記憶用
# KAN_ + 文字キー

  KAN_I = Virtual
  KAN_O = Virtual

  KAN_H = Virtual
  KAN_J = Virtual
  KAN_K = Virtual
  KAN_L = Virtual
  KAN_Semicolon = Virtual

  KAN_N = Virtual
  KAN_M = Virtual
  KAN_Comma = Virtual
  KAN_Period = Virtual

  KAN_W = Virtual
  KAN_E = Virtual
  KAN_R = Virtual

  KAN_A = Virtual
  KAN_S = Virtual
  KAN_D = Virtual
  KAN_F = Virtual

  KAN_Z = Virtual
  KAN_X = Virtual
  KAN_C = Virtual
  KAN_V = Virtual
  KAN_B = Virtual

# システム共通の　キー定義
  BS = Backspace
  C_ = Control
  Ctrl = Control
  CR = Enter
  DEL = Delete # {Del}
  DELx = repeat[ Delete, default[$0, 1] ] # {Del $0}
  ESC = Escape
  ESCx = repeat[ Escape, default[$0, 1] ] # {Escape $0}
  GUI = Meta
  M_ = Meta
  RET = Enter
  S_ = Shift
  SP_ = Space
  SP_x = repeat[ Space, default[$0, 1] ] # {Space $0}
  UP = ArrowUp # {↑}
  UPx = repeat[ ArrowUp, default[$0, 1] ] # {↑ $0}
  DOWN = ArrowDown # {↓}
  DOWNx = repeat[ ArrowDown, default[$0, 1] ] # {↓ $0}
  LEFT = ArrowLeft  # {←}
  LEFTx = repeat[ ArrowLeft, default[$0, 1] ] # {← $0}
  RIGHT = ArrowRight # {→}
  RIGHTx = repeat[ ArrowRight, default[$0, 1] ] # {→ $0}

# 定義予定
#PgUp =
#PgDn =

# 日本語キーボード
  HanZen = 0x0035 #半/全
  Muhenkan = 0x008B #無変換
  Henkan = 0x008A #変換
  Kana2 = 0x0088 #カナ/かな

# システム別のキー定義
# MacOS 標準IME　Windows風のキー操作をON 条件で設定
[system="MacOS"]
# ========================================
# コピー中の状態を記録する
Meta{C} >> COPYINGState  Meta{C}
Meta{X} >> COPYINGState  Meta{X}
Meta{V} >> Meta{V} !COPYINGState
# ========================================

  ime_on = !IMEState IMEState Lang1 # かなオン
  ime_off = !IMEState 16ms Lang2 # かなオフ

  CHR = $(printf "$0" | LANG=ja_JP.UTF-8 pbcopy) 64ms Meta{V} 64ms
  STR = CHR["$0"] ^
  PREV = Control{P} 32ms # 1行　戻る
  NEXT = Control{N} 32ms # 1行　進む
  HOME = Control{A} 32ms # {Home}
  END = Control{E} 32ms # {End}
  BUN_MATU = Meta{ArrowDown} #文末に移動
  COPY = COPYINGState Meta{C} 32ms
  CUT = COPYINGState Meta{X} 32ms
  PASTE = Meta{V} 32ms !COPYINGState
  SAI_HEN = Lang1 Lang1 # 再変換
  KATA_HEN = Control{I} # ^i カタカナ
  HIRA_HEN = Control{U} # ^u ひらがな
  SAVE = Meta{S} # ファイル保存
  Undo = Meta{Z} # Undo
  Redo = Shift{Meta{Z}} # Redo
  CLIP_CLR = CHR["　"] (Shift Control){B} 24ms Meta{X} 24ms !COPYINGState # コピークリア

[system="Windows"]
# ================================================
# コピー中の状態を記録しない
# Windowsはクリップボードをコマンドで上書きしない
# ================================================

  ime_on = !IMEState IMEState Lang1 # かなオン
  ime_off = !IMEState 16ms Lang2 # かなオフ
  ime_complete = Slash Enter Backspace # 汎用: Slash Enter Backspace   # 「・」が残る欠点あり
  ime_pause = ime_complete Lang2
  ime_resume = Lang1

  CHR = "$0" Enter
  STR = ime_pause "$0" ime_resume ^
  PREV = ArrowRight # 1行戻る 縦書き 右移動
  NEXT = ArrowLeft # 1行進む 縦書き 左移動
  HOME = Home # {Home}
  END = End # {End}
  BUN_MATU = Control{End} #文末に移動
  COPY = Control{C}
  CUT = Control{X}
  PASTE = Control{V{130ms}}
  SAI_HEN = M_{Slash} IMEState # 再変換
  KATA_HEN = F7 # ^i カタカナ
  HIRA_HEN = F6 # ^u ひらがな
  SAVE = Control{S} # ファイル保存
  Undo = Control{Z} # Undo
  Redo = Control{Y} # Redo
  CLIP_CLR = Enter{24ms} Space Shift{Home} Control{X} Backspace # コピークリア

[system="Linux"]
# ========================================
# コピー中の状態を記録する
  Control{C} >> COPYINGState  Control{C}
  Control{X} >> COPYINGState  Control{X}
  Control{V} >>Control{V} !COPYINGState
# ========================================
# Mozcのキー設定を追加　変換　無変換キー　IMEオンオフ
# 直接入力	   Henkan	IMEを有効化
# 入力文字無し Muhenkan IMEを無効化

  ime_on = !IMEState IMEState Convert# かなオン
  ime_off = !IMEState 16ms NonConvert # かなオフ
  ime_complete = Slash Enter Backspace # 汎用: Slash Enter Backspace   # 「・」が残る欠点あり

# クリップボードに文字を渡すために　xsel をインストールをする
  CHR = ime_complete $(printf "$0" | xsel -i -b) 32ms Control{V} 32ms
  STR = CHR["$0"] ^
  PREV = ArrowRight # 1行戻る 縦書き 右移動
  NEXT = ArrowLeft # 1行進む 縦書き 左移動
  HOME = Home # {Home}
  END = End # {End}
  BUN_MATU = Control{End} #文末に移動
  COPY = COPYINGState Control{C}
  CUT = COPYINGState Control{X}
  PASTE = Control{V{130ms}} !COPYINGState
  SAI_HEN = M_{Slash} IMEState # 再変換
  KATA_HEN = F7 # ^i カタカナ
  HIRA_HEN = F6 # ^u ひらがな
  SAVE = Control{S} # ファイル保存
  Undo = Control{Z} # Undo
  Redo = Control{Y} # Redo
  CLIP_CLR = Enter{24ms} Space Shift{Home} Control{X} Backspace !COPYINGState # コピークリア


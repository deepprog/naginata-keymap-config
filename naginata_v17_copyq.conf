# システム共通のキー定義
  BS = Backspace
  C_ = Control
  Ctrl = Control
  CR = Enter
  DEL = Delete # {Del}
  DELx = repeat[ Delete, default[$0, 1] ] # {Del $0}
  ESC = Escape
  ESCx = repeat[ Escape, default[$0, 1] ] # {Escape $0}
  TAB = Tab
  GUI = Meta
  M_ = Meta
  RET = Enter
  S_ = Shift
  SP_ = Space
  SP_x = repeat[ Space, default[$0, 1] ] # {Space $0}
  UP = ArrowUp # {↑}
  UPx = repeat[ ArrowUp, default[$0, 1] ] # {↑ $0}
  DOWN = ArrowDown # {↓}
  DOWNx = repeat[ ArrowDown, default[$0, 1] ] # {↓ $0}
  LEFT = ArrowLeft  # {←}
  LEFTx = repeat[ ArrowLeft, default[$0, 1] ] # {← $0}
  RIGHT = ArrowRight # {→}
  RIGHTx = repeat[ ArrowRight, default[$0, 1] ] # {→ $0}

  KC_MUTE = AudioVolumeMute #0xE020
  KC_VOLD = AudioVolumeDown #0xE02E
  KC_VOLU = AudioVolumeUp # 0xE030

  KC_MPRV = MediaTrackPrevious #0xE010
  KC_MNXT = MediaTrackNext #0xE019
  KC_MPLY = MediaPlayPause #0x00AC

# 定義予定
#PgUp =
#PgDn =

# 日本語キーボード
  HanZen = 0x0035 #半/全
  Muhenkan = 0x008B #無変換
  Henkan = 0x008A #変換
  Kana2 = 0x0088 #カナ/かな

[default]

# システム別のキー定義
# MacOS 標準IME Windows風のキー操作をON 条件で設定
# copyQ GUIをインストール copyQのCLIにパス設定をする
#
[system="MacOS" ]
# ========================================
# コピー中の状態を記録する
   Meta{V} >> $(copyq -e "if(read(0) != clipboard()) copy(read(0))") 100ms Meta{V}
# ========================================
  ime_on = IMEState Lang1 # かなオン
  ime_off = !IMEState 16ms Lang2 # かなオフ

  CHR = $(copyq disable) 32ms \
        $(printf "$0" | LANG=ja_JP.UTF-8 pbcopy) 50ms Meta{V} 50ms \
        $(copyq enable)
  STR = CHR["$0"] ^
  PREV = Control{P} 32ms # 1行戻る
  NEXT = Control{N} 32ms # 1行進む
  HOME = Control{A} 32ms # {Home}
  END = Control{E} 32ms # {End}
  BUN_MATU = Meta{ArrowDown} #文末に移動
  COPY = Meta{C} 32ms
  PASTE = $(copyq -e "if(read(0) != clipboard()) copy(read(0))") 100ms Meta{V}
  CUT = Meta{X} 32ms
  SAI_HEN = Lang1 Lang1 # 再変換
  KATA_HEN = Control{I} # ^i カタカナ
  HIRA_HEN = Control{U} # ^u ひらがな
  SAVE = Meta{S} # ファイル保存
  Undo = Meta{Z} # Undo
  Redo = Shift{Meta{Z}} # Redo
  CLIP_CLR = CHR["　"] (Shift Control){B} 24ms Meta{X} 24ms
[default]

[system="Windows"]
  ime_on = IMEState Lang1 # かなオン
  ime_off = !IMEState 16ms Lang2 # かなオフ
  ime_complete = Slash Enter Backspace # 汎用: Slash Enter Backspace   # 「・」が残る欠点あり
  ime_pause = ime_complete Lang2
  ime_resume = Lang1

  CHR = "$0" Enter
  STR = ime_pause "$0" ime_resume ^
  PREV = ArrowRight # 1行戻る 縦書き 右移動
  NEXT = ArrowLeft # 1行進む 縦書き 左移動
  HOME = Home # {Home}
  END = End # {End}
  BUN_MATU = Control{End} #文末に移動
  COPY = Control{C}
  PASTE = Control{V{130ms}}
  CUT = Control{X}
  SAI_HEN = M_{Slash} IMEState # 再変換
  KATA_HEN = F7 # ^i カタカナ
  HIRA_HEN = F6 # ^u ひらがな
  SAVE = Control{S} # ファイル保存
  Undo = Control{Z} # Undo
  Redo = Control{Y} # Redo
  CLIP_CLR = Enter{24ms} Space Shift{Home} Control{X} Backspace # コピークリア
[default]

[system="Linux"]
# Mozcのキー設定をします
# 直接入力	   Henkan	IMEを有効化
# 入力文字無し Muhenkan IMEを無効化

  ime_on = IMEState Convert# かなオン
  ime_off = !IMEState 16ms NonConvert # かなオフ
  ime_complete = Slash Enter Backspace # 汎用: Slash Enter Backspace   # 「・」が残る欠点あり

# クリップボードに文字を渡すためにxselをインストールをする
# ================================================
# Linuxはクリップボードをセカンダリに一時退避して、ペースト後に復元する
# 退避するデータはテキストデータに限る
# 環境によっては固定名詞、記号入力ができない
# ================================================
  CHR = \
    ime_complete 32ms  REM[/*入力文字確定*/] \
    $(xsel -o -b | xsel -i -s && printf $0 | xsel -i -b) 64ms  REM[/*セカンダリにコピーしクリップボードに文字列を設定*/] \
    Control{V} 64ms  REM[/*ペースト*/] \
    $(xsel -o -s | xsel -i -b) 64ms  REM[/*セカンダリからクリップボードの文字列を復元*/] \
    $(printf "" | xsel -i -s)  REM[/*セカンダリをリセット*/]

  STR = CHR["$0"] ^
# ================================================

  PREV = ArrowRight # 1行戻る 縦書き 右移動
  NEXT = ArrowLeft # 1行進む 縦書き 左移動
  HOME = Home # {Home}
  END = End # {End}
  BUN_MATU = Control{End} #文末に移動
  COPY = Control{C}
  PASTE = Control{V{130ms}}
  CUT = Control{X}
  SAI_HEN = M_{Slash} IMEState # 再変換
  KATA_HEN = F7 # ^i カタカナ
  HIRA_HEN = F6 # ^u ひらがな
  SAVE = Control{S} # ファイル保存
  Undo = Control{Z} # Undo
  Redo = Control{Y} # Redo
  CLIP_CLR = Enter{24ms} Space Shift{Home} Control{X} Backspace # コピークリア
[default]


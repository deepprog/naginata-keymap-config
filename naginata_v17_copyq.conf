# アプリごとのIME ON OFF 設定 {
# コンテキストのアクティブ時に実行します
# コンテキスト名はトレイアイコンのNext Key Infoを使って確認
# アプリ一つずつにVirtual Key を割り当てる

# MacOS iText Express {
  V_MacOS_iText_Express = Virtual
  [system="MacOS" class = "iText Express" modifier = "V_MacOS_iText_Express"]
    ContextActive >> ime_on ^

  [system="MacOS" class = "iText Express" modifier = "!V_MacOS_iText_Express"]
    ContextActive >> ime_off ^

  [system="MacOS" class = "iText Express" modifier = "!NaginataOff !Meta !Control !Alt"]
    (H J) >> ime_on  V_MacOS_iText_Express ^
    (F G) >> ime_off !V_MacOS_iText_Express ^
# } MacOS iText Express

# MacOS mi {
  V_MacOS_mi = Virtual
  [system="MacOS" class = "mi" modifier = "V_MacOS_mi"]
    ContextActive >> ime_on ^

  [system="MacOS" class = "mi" modifier = "!V_MacOS_mi"]
    ContextActive >> ime_off ^

  [system="MacOS" class = "mi" modifier = "!NaginataOff !Meta !Control !Alt"]
    (H J) >> ime_on V_MacOS_mi ^
    (F G) >> ime_off !V_MacOS_mi ^
# } MacOS mi

# } アプリごとのIME ON OFF 設定

# キーボード レイヤー

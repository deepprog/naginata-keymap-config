# D F 右手
  Q12345[          HOME^, S_{END} BS^,  SAI_HEN^,          DEL^, S_{ESCx[3]}^, D F, Y,U,I,O,P ]
  Q12345[ S_{Enter} END^,         UP^,   S_{UP}^,   S_{UPx[7]}^,    KATA_HEN^, D F, H,J,K,L,Semicolon]

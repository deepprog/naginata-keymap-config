# keymapper 薙刀式v17ベスト版
# (https://github.com/deepprog/naginata-keymap-config)
# 薙刀式配列v17ベスト版　　作　大岡俊彦
# 2026年01月11日[【薙刀式】v17ベスト版、発表。](http://oookaworks.seesaa.net/article/519707171.html#gsc.tab=0)

# keymapper version >= 5.5.0

# 使用するsoft
# Windows: houmain/keymapper
# MacOS: houmain/keymapper, copyQ, pbcopy(MacOSにあるコマンド）
# Linux: houmain/keymapper, xsel (xclip, wl-clipboard)

# houmain/keymapper OSとCPU別にインストールするファイルは違います
# MacOS copyQ、GUI版のインストール、CLI版のcopyQが実行できるようにパスorリンク設定をしてください
# copyQのインストール手順に書かれています
# Linuxは、xselで設定してます。xclip, wl-clipboard が良い場合は設定を変更してください

# 機能追加
# シフト英数モードからエンター、かなモード復帰

# 固有名詞、記号の入力方式
# Windows 直接文字入力
# MacOS クリップボード経由入力 pbcopy copyQ
# Linux クリップボード経由入力 xsel

# 固有名詞、記号でクリップボードを上書きしてペーストで文字入力させます
# メリットは文字入力の自由度が高く、速いこと
# デメリットはコピー、ペースト操作は必ず続けて行う必要があること
# そのデメリットは、copyQを併用してクリップボードを復元します（テキストデータのみ対応）
# MacOS copyQをコマンド操作し、貼り付け前にcopyQの履歴からクリップボードを復元します
# Linux xselをコマンド操作し、貼り付け前にセカンダリからクリップボードを復元します

@options no-update
@allow-unmapped-commands
@enforce-lowercase-commands
@forward-modifiers Shift Control Alt
@virtual-keys-toggle false

# コメント用マクロ
# まだ使用してないので無効化
#  _ = # _[コメント]
#  __ = # __[コメント]
  REM = # REM[コメント]

# 仮想キー 定義 ===============================
  NaginataOff = Virtual # ホットキーの再現用
  IMEState = Virtual # IMEのON OFF記憶用
  V_Shift_en = Virtual # シフト英数モード中

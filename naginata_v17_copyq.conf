  Q12345[        ,        ,        ,        ,        , Adjust, Q,W,E,R,T ]
  Q12345[ KC_VOLD, KC_VOLU, KC_VOLD, KC_MUTE, KC_VOLU, Adjust, A,S,D,F,G ]
  Q12345[ KC_MPRV, KC_MNXT, KC_MPRV, KC_MPLY, KC_MNXT, Adjust, Z,X,C,V,B ]


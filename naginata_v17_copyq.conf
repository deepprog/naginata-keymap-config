  (D F){ O{300ms} } >> DEL
  (D F){ J{300ms} } >> UP
  (D F){ K{300ms} } >> (Shift UP)
  (D F){ M{300ms} } >> DOWN
  (D F){ Comma{300ms} } >> (Shift DOWN)


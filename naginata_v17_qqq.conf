# ********** センターシフト **********
# センターシフト用マクロ
#前置の通常シフト
#  CS_5 = $5{$6} >> $0; $5{$7} >> $1; $5{$8} >> $2; $5{$9} >> $3; $5{$10} >> $4
#同時連続シフト
#
  CS_5 = ($5 $6) >> $0; ($5 $7) >> $1; ($5 $8) >> $2; ($5 $9) >> $3; ($5 $10) >> $4

  TOU_TEN = ( Comma Enter )^ # "、" 読点（とうてん）
  KU_TEN = ( Period Enter )^ # "。" 句点（くてん）

# センターシフト 左手
  CS_5[       , me[め], ri[り],      ne[ね], S_{LEFT[シ左]}, Space, Q,W,E,R,T]
  CS_5[ se[せ], mi[み], ni[に],      ma[ま],         ti[ち], Space, A,S,D,F,G]
  CS_5[ ho[ほ], hi[ひ], wo[を], TOU_TEN[、],         nu[ぬ], Space, Z,X,C,V,B]

# センターシフト 右手
  CS_5[ S_{RIGHT[シ右]},     sa[さ], yo[よ],  e[え], yu[ゆ], Space, Y,U,I,O,P]
  CS_5[          ya[や],     no[の], mo[も], tu[つ], hu[ふ], Space, H,J,K,L,Semicolon]
  CS_5[           o[お], KU_TEN[。], mu[む], wa[わ], re[れ], Space, N,M,Comma,Period,Slash]

# ********** 単打 **********
# 単打用マクロ
  KB_5 = $5 >> $0; $6 >> $1; $7 >> $2; $8 >> $3; $9 >> $4

  ON_BIKI = Minus ^ # "ー" 音引き（おんびき）

# 単打 左手
  KB_5[       , ki[き], te[て], si[し], LEFT[左], Q,W,E,R,T]
  KB_5[ ro[ろ], ke[け], to[と], ka[か],  xtu[っ], A,S,D,F,G]
  KB_5[ ho[ほ], hi[ひ], ha[は], ko[こ],   so[そ], Z,X,C,V,B]

# 単打 右手
  KB_5[ RIGHT[右], BS[後], ru[る], su[す],      he[へ], Y,U,I,O,P]
  KB_5[    ku[く],  a[あ],  i[い],  u[う], ON_BIKI[ー], H,J,K,L,Semicolon]
  KB_5[    ta[た], na[な], xn[ん], ra[ら],      re[れ], N,M,Comma,Period,Slash]

[default]
  (Control Shift){0} >> V_NaginataOff ^ # 薙刀式オフ
  (Control Shift){1} >> !V_NaginataOff ^ # 薙刀式再開

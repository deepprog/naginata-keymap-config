# システム共通のキー定義
  BS = Backspace
  C_ = Control
  Ctrl = Control
  CR = Enter
  DEL = Delete # {Del}
  DELx = repeat[ Delete, default[$0, 1] ] # {Del $0}
  ESC = Escape
  ESCx = repeat[ Escape, default[$0, 1] ] # {Escape $0}
  TAB = Tab
  GUI = Meta
  M_ = Meta
  RET = Enter
  S_ = Shift
  SP_ = Space
  SP_x = repeat[ Space, default[$0, 1] ] # {Space $0}
  UP = ArrowUp # {↑}
  UPx = repeat[ ArrowUp, default[$0, 1] ] # {↑ $0}
  DOWN = ArrowDown # {↓}
  DOWNx = repeat[ ArrowDown, default[$0, 1] ] # {↓ $0}
  LEFT = ArrowLeft  # {←}
  LEFTx = repeat[ ArrowLeft, default[$0, 1] ] # {← $0}
  RIGHT = ArrowRight # {→}
  RIGHTx = repeat[ ArrowRight, default[$0, 1] ] # {→ $0}

  KC_MUTE = AudioVolumeMute # 0xE020
  KC_VOLD = AudioVolumeDown # 0xE02E
  KC_VOLU = AudioVolumeUp # 0xE030

  KC_MPRV = MediaTrackPrevious # 0xE010
  KC_MNXT = MediaTrackNext # 0xE019
  KC_MPLY = MediaPlayPause # 0x00AC

# 定義予定
#PgUp =
#PgDn =

# 日本語キーボード
  HanZen = 0x0035 #半/全
  Muhenkan = 0x008B #無変換
  Henkan = 0x008A #変換
  Kana2 = 0x0088 #カナ/かな

[default]

# システム別のキー定義
# MacOS 標準IME Windows風のキー操作をON 条件で設定
# ucytpe コンパイルして、実行ファイルにパスを通す
#
[system="MacOS" ]
  ime_on = !V_Composition V_IMEState Lang1 # かなオン
  ime_off = !V_Composition !V_IMEState 16ms Lang2 # かなオフ
  ime_complete = !V_Composition (Control M)

  CHR = $(uctype "$0")
  STR = CHR["$0"] ^

  iCHR = ime_complete CHR["$0"]
  iSTR = iCHR["$0"] ^

  PREV = Control{P} 32ms # 1行戻る
  NEXT = Control{N} 32ms # 1行進む
  HOME = Control{A} 32ms # {Home}
  END = Control{E} 32ms # {End}
  BUN_MATU = Meta{ArrowDown} #文末に移動
  COPY = Meta{C} 32ms
  PASTE = !V_Composition Meta{V{32ms}}
  CUT = Meta{X} 32ms
  SAI_HEN = V_Composition Lang1 Lang1 # 再変換
  KATA_HEN = Control{I} # ^i カタカナ
  HIRA_HEN = Control{U} # ^u ひらがな
  SAVE = Meta{S} # ファイル保存
  Undo = Meta{Z} # Undo
  Redo = Shift{Meta{Z}} # Redo
  CLIP_CLR = CHR["　"] (Shift Control){B} 24ms Meta{X} 24ms
[default]

[system="Windows"]
  ime_on = !V_Composition V_IMEState Lang1 # かなオン
  ime_off = !V_Composition !V_IMEState 16ms Lang2 # かなオフ
  ime_complete = Slash Enter Backspace # 汎用: Slash Enter Backspace   # 「・」が残る欠点あり
  ime_pause = ime_complete Lang2
  ime_resume = Lang1

  CHR = "$0" Enter
  STR = ime_pause "$0" ime_resume ^

  iCHR = CHR["$0"]
  iSTR = !V_Composition STR["$0"]

  PREV = ArrowRight # 1行戻る 縦書き 右移動
  NEXT = ArrowLeft # 1行進む 縦書き 左移動
  HOME = Home # {Home}
  END = End # {End}
  BUN_MATU = Control{End} #文末に移動
  COPY = Control{C}
  PASTE = Control{V{130ms}}
  CUT = Control{X}
  SAI_HEN = M_{Slash} V_IMEState # 再変換
  KATA_HEN = F7 # ^i カタカナ
  HIRA_HEN = F6 # ^u ひらがな
  SAVE = Control{S} # ファイル保存
  Undo = Control{Z} # Undo
  Redo = Control{Y} # Redo
  CLIP_CLR = Enter{24ms} Space Shift{Home} Control{X} Backspace # コピークリア
[default]

[system="Linux"]
# Mozcのキー設定をします
# 直接入力	   Henkan	IMEを有効化
# 入力文字無し Muhenkan IMEを無効化

  ime_on = !V_Composition V_IMEState Convert# かなオン
  ime_off = !V_Composition !V_IMEState 16ms NonConvert # かなオフ
  ime_complete = !V_Composition (Control M)

# クリップボードに文字を渡すためにxselをインストールをする
# ================================================
# Linuxはクリップボードをセカンダリに一時退避して、ペースト後に復元する
# 退避するデータはテキストデータに限る
# 環境によっては固定名詞、記号入力ができない
# ================================================
  CHR = \
    $(xsel -o -b | xsel -i -s && printf $0 | xsel -i -b) 64ms  REM[/*セカンダリにコピーしクリップボードに文字列を設定*/] \
    Control{V} 64ms  REM[/*ペースト*/] \
    $(xsel -o -s | xsel -i -b) 64ms  REM[/*セカンダリからクリップボードの文字列を復元*/] \
    $(printf "" | xsel -i -s)  REM[/*セカンダリをリセット*/]

  STR = CHR["$0"] ^
# ================================================

  iCHR = ime_complete 32ms CHR["$0"]
  iSTR = iCHR["$0"] ^

  PREV = ArrowRight # 1行戻る 縦書き 右移動
  NEXT = ArrowLeft # 1行進む 縦書き 左移動
  HOME = Home # {Home}
  END = End # {End}
  BUN_MATU = Control{End} #文末に移動
  COPY = Control{C}
  PASTE = Control{V{130ms}}
  CUT = Control{X}
  SAI_HEN = M_{Slash} V_IMEState # 再変換
  KATA_HEN = F7 # ^i カタカナ
  HIRA_HEN = F6 # ^u ひらがな
  SAVE = Control{S} # ファイル保存
  Undo = Control{Z} # Undo
  Redo = Control{Y} # Redo
  CLIP_CLR = Enter{24ms} Space Shift{Home} Control{X} Backspace # コピークリア
[default]

# 薙刀式　定義開始
  Lower = Lang2 | Muhenkan #英数(MacOS) | 無変換(Winodws)
  Raise = Lang1 | Henkan   #かな(MacOS) | 変換(Winodws)
  Adjust = Lower Raise

# アプリごとのIME ON OFF 設定 {
# コンテキストのアクティブ時に実行します
# コンテキスト名はトレイアイコンのNext Key Infoを使って確認
# アプリ一つずつにVirtual Key を割り当てる

# MacOS iText Express {
  V_MacOS_iText_Express = Virtual
  [system="MacOS" class = "iText Express" modifier = "V_MacOS_iText_Express"]
    ContextActive >> ime_on ^

  [system="MacOS" class = "iText Express" modifier = "!V_MacOS_iText_Express"]
    ContextActive >> ime_off ^

  [system="MacOS" class = "iText Express" modifier = "!V_NaginataOff !Meta !Control !Alt"]
    (H J) >> ime_on  V_MacOS_iText_Express ^
    (F G) >> ime_off !V_MacOS_iText_Express ^
# } MacOS iText Express

# MacOS mi {
  V_MacOS_mi = Virtual
  [system="MacOS" class = "mi" modifier = "V_MacOS_mi"]
    ContextActive >> ime_on ^

  [system="MacOS" class = "mi" modifier = "!V_MacOS_mi"]
    ContextActive >> ime_off ^

  [system="MacOS" class = "mi" modifier = "!V_NaginataOff !Meta !Control !Alt"]
    (H J) >> ime_on V_MacOS_mi ^
    (F G) >> ime_off !V_MacOS_mi ^
# } MacOS mi

# } アプリごとのIME ON OFF 設定

# キーボード レイヤー
# Adjust(Lower + Raise)レイヤー
[modifier = "Lower Raise !V_NaginataOff !Meta !Alt !Control"]

#[     ,     ,     ,     ,     ] #[     ,   F7,   F8,   F9,   F10]
#[ Vol-, Vol+,  Vol, Mute, Vol+] #[     ,   F4,   F5,   F6,   F11]
#[ Prev, Next, Prev, Play, Next] #[  F10,   F1,   F2,   F3,   F12]

  LLL[        ,        ,        ,        ,        , Adjust, Q,W,E,R,T ]
  LLL[ KC_VOLD, KC_VOLU, KC_VOLD, KC_MUTE, KC_VOLU, Adjust, A,S,D,F,G ]
  LLL[ KC_MPRV, KC_MNXT, KC_MPRV, KC_MPLY, KC_MNXT, Adjust, Z,X,C,V,B ]

  RRR[        ,      F7,      F8,      F9,     F10, Adjust, Y,U,I,O,P ]
  RRR[        ,      F4,      F5,      F6,     F11, Adjust, H,J,K,L,Semicolon ]
  RRR[    F10 ,      F1,      F2,      F3,     F12, Adjust, N,M,Comma,Period,Slash ]

[default]

# Raiseレイヤー
[modifier = "!Lower Raise !V_NaginataOff !Meta !Alt !Control"]
#[  `, '7, (8, )9,  0 ] #[ =,  7,  8,  9,  0 ]
#[   , $4, %5, &6,    ] #[ :,  4,  5,  6,  ¥ ]
#[  {, !1, "2, #3,  } ] #[ [,  1,  2,  3,  ] ]

  LLL[  S_{BracketLeft}, S_{7}, S_{8}, S_{9},         S_{0}, Raise, Q,W,E,R,T ]
  LLL[                 , S_{4}, S_{5}, S_{6},              , Raise, A,S,D,F,G ]
  LLL[ S_{BracketRight}, S_{1}, S_{2}, S_{3}, S_{Backslash}, Raise, Z,X,C,V,B ]

  RRR[            Equal,     7,     8,     9,             0, Raise, Y,U,I,O,P ]
  RRR[            Quote,     4,     5,     6,        0x0089, Raise, H,J,K,L,Semicolon ]
  RRR[     BracketRight,     1,     2,     3,     Backslash, Raise, N,M,Comma,Period,Slash ]

[default]

# Lowerレイヤー
[modifier = "Lower !Raise !V_NaginataOff !Meta !Alt !Control"]
#[  Esc,   7,   8,   9,   0 ] #[ Home,   BS,    -=,   Del,   Esc ]
#[  Tab,   4,   5,   6,     ] #[ Left,   Up, Right,      , Enter ]
#[    (,   1,   2,   3,   ) ] #[  End, Down,   Tab,      ,       ]

  LLL[   ESC,     7,     8,     9,     0, Lower, Q,W,E,R,T ]
  LLL[   TAB,     4,     5,     6,      , Lower, A,S,D,F,G ]
  LLL[ S_{8},     1,     2,     3, S_{9}, Lower, Z,X,C,V,B ]

  RRR[  HOME,    BS, Minus,   DEL,   ESC, Lower, Y,U,I,O,P ]
  RRR[  LEFT,    UP, RIGHT,      , Enter, Lower, H,J,K,L,Semicolon ]
  RRR[   END,  DOWN,   TAB,      ,      , Lower, N,M,Comma,Period,Slash ]

[default]

# =============================================
# 英数モード
# =============================================
# Controlが押下時の配列をQwertyままか、変更後のキー配列に変更するかコメントアウトで選択する
#
[modifier = "!V_NaginataOff !V_IMEState !Meta !Alt !Control"] # Control + Qwerty
# [modifier = "!V_NaginataOff !V_IMEState !Meta !Alt"]        # Control + 変更後のキー配列

# キーリピート 機能キー
# 編集モード1
# D F 右手
  (D F){ O{300ms} } >> DEL
  (D F){ J{300ms} } >> UP
  (D F){ K{300ms} } >> (Shift UP)
  (D F){ M{300ms} } >> DOWN
  (D F){ Comma{300ms} } >> (Shift DOWN)

# 編集モード2
# C V 右手
  (C V){ J{300ms} } >> LEFT
  (C V){ K{300ms} } >> RIGHT
  (C V){ M{300ms} } >> (Shift LEFT)
  (C V){ Comma{300ms} } >> (Shift RIGHT)

# ********** 3キー同時 **********
# 編集モード1
# D F 右手
  RRR[          HOME^, S_{END} BS^,  SAI_HEN^,          DEL^, S_{ESCx[3]}^, D F, Y,U,I,O,P ]
  RRR[ S_{Enter} END^,         UP^,   S_{UP}^,   S_{UPx[7]}^,    KATA_HEN^, D F, H,J,K,L,Semicolon]
  RRR[           END^,       DOWN^, S_{DOWN}^, S_{DOWNx[7]}^,    HIRA_HEN^, D F, N,M,Comma,Period,Slash ]
# 左手 J K
  LLL[    BUN_MATU^, CHR["／"]^,           ,      SAVE^, CHR["・"]^, J K, Q,W,E,R,T ]

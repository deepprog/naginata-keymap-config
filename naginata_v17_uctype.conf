  RRR[  S_{END}^, S_{LEFT}^, S_{RIGHT}^, END S_{HOME}^,          Redo^, C V, N,M,Comma,Period,Slash]
# 左手 M Comma
  (M Comma Q) >> CHR["｜"] ^
  (M Comma W) >> STR["　　　×　　　×　　　×"] Enter
  (M Comma E) >> HOME PREV END DEL DEL NEXT ^
  (M Comma R) >> HOME Enter{24ms} Space NEXT ^
  (M Comma T) >> CHR["〇"] ^

  (M Comma A) >> CHR["《"] ^
  (M Comma S) >> CHR["【"] ^
  (M Comma D) >> HOME PREV END DEL DEL DEL DEL NEXT ^
  (M Comma F) >> HOME CR{24ms} Space Space Space NEXT ^
  (M Comma G) >> Space Space Space ^

  (M Comma Z) >> CHR["》"] ^
  (M Comma X) >> CHR["】"] ^
  (M Comma C) >> CHR["」"] Enter ^
  (M Comma V) >> CHR["」"] Enter CHR["「"] ^
  (M Comma B) >> CHR["」"] Enter Space ^


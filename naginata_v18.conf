# keymapper 薙刀式v18トップ版
# (https://github.com/deepprog/naginata-keymap-config)
# 薙刀式v18トップ版　　作　大岡俊彦
# 2026年07月14日[【薙刀式】v18トップ版、発表。](https://oookaworks.seesaa.net/article/521080503.html#gsc.tab=0)

# 使用するsoft
# keymapper version >= 5.6.0
# houmain/keymapper OSとCPU別にインストールするファイルは違います

# Windows: houmain/keymapper

# MacOS: houmain/keymapper, uctype
# MacOS uctype.swiftをコンパイルして実行ファイルにパスを通す

# Linux: houmain/keymapper, xsel (xclip, wl-clipboard)
# Linuxは、xselで設定してます。xclip, wl-clipboard が良い場合は設定を変更してください

# 機能追加
# シフト英数モードからエンター、かなモード復帰
# 英数モード SDF+右手にアラビア数字

# ロールオーバーの設定を追加した
# 順次打鍵の設定を追加して１打目を離さずに２文字ずつ入力できる
# 例
# O{I} する J{I} ある　M{K} ない

# 固有名詞、記号の入力方式
# Windows 直接文字入力
# MacOS uctype からの直接入力
# Linux クリップボード経由入力 xsel

# MacOS uctypeから直接入力します。クリップボードを使用しない

# 固有名詞、記号でクリップボードを上書きしてペーストで文字入力させます
# メリットは文字入力の自由度が高く、速いこと
# デメリットはコピー、ペースト操作は必ず続けて行う必要があること
# Linux xselをコマンド操作し、貼り付け前にセカンダリからクリップボードを復元します

[default]
@options no-update
@allow-unmapped-commands
@enforce-lowercase-commands
@forward-modifiers Shift Control Alt
@virtual-keys-toggle false

# コメント用マクロ
  REM = # REM[コメント]

# 仮想キー 定義 ===============================
  V_NaginataOff = Virtual # ホットキーの再現用
  V_IMEState = Virtual # IMEのON OFF記憶用
  V_Shift_en = Virtual # シフト英数モード中
  V_Composition = Virtual # 未確定文字　入力中
  _ = Virtual # QQQマクロ 無効化する箇所用

  V_KANJI_V = Virtual # ワンショット漢直　変換{V} 記憶用
  V_KANJI_M = Virtual # ワンショット漢直　変換{M} 記憶用

# 仮想キー 定義 ここまで =======================

# 引数の有効無効マクロ
  QQQ = ($5 $6) >> $0; ($5 $7) >> $1; ($5 $8) >> $2; ($5 $9) >> $3; ($5 $10) >> $4
  RRR = QQQ # QQQと同じ　右手鍵盤の識別用
  LLL = QQQ # QQQと同じ　左手鍵盤の識別用

